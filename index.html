<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MICOZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  :root {
    --plum-900: #2d2347;
    --plum-700: #3a2e58;
    --plum-500: #4d3470;
    --plum-100: #e8d8f0;
    --plum-50:  #f5edf7;
    --cream:    #fafafa;
    --ink:      #1a1424;
    --muted:    #6b5d72;
    --gold:     #b89968;
    --serif:    "Noto Serif KR", "Spectral", serif;
    --sans:     "Pretendard", -apple-system, system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 56px;
    padding: 48px 24px;
    width: 100%;
    max-width: 640px;
  }

  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: var(--serif);
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 0.22em;
    color: var(--plum-900);
    line-height: 1;
  }

  .logo span {
    color: var(--gold);
  }

  .tagline {
    font-family: "Spectral", serif;
    font-style: italic;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.14em;
    color: var(--muted);
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--plum-100);
    margin: 0 auto;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
  }

  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 36px 24px 32px;
    background: #fff;
    border: 1px solid var(--plum-100);
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
  }

  .card:hover {
    border-color: var(--plum-500);
    box-shadow: 0 8px 32px rgba(58, 46, 88, 0.10);
    transform: translateY(-2px);
  }

  .card-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .card-icon.shop {
    background: var(--plum-50);
  }

  .card-icon.admin {
    background: #f0edf6;
  }

  .card-label {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .card-title {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 400;
    color: var(--plum-900);
    text-align: center;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .card-btn {
    margin-top: 4px;
    padding: 10px 28px;
    background: var(--plum-700);
    color: #fff;
    font-size: 13px;
    letter-spacing: 0.08em;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.2s;
  }

  .card:hover .card-btn {
    background: var(--plum-900);
  }

  @media (max-width: 480px) {
    .cards {
      grid-template-columns: 1fr;
    }
    .logo {
      font-size: 36px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo-block">
    <div class="logo">MI<span>C</span>OZ</div>
    <div class="tagline">Quiet Luxury · Modern Minimal</div>
    <div class="divider"></div>
  </div>

  <div class="cards">
    <a class="card" href="MICOZ-app.html">
      <div class="card-icon shop">🛍️</div>
      <div class="card-label">Storefront</div>
      <div class="card-title">쇼핑몰</div>
      <div class="card-desc">메인 홈 · 제품 · 장바구니<br>결제 · 마이페이지</div>
      <button class="card-btn">쇼핑몰 입장</button>
    </a>

    <a class="card" href="MICOZ-admin.html">
      <div class="card-icon admin">⚙️</div>
      <div class="card-label">Back Office</div>
      <div class="card-title">관리자</div>
      <div class="card-desc">대시보드 · 회원 · 상품<br>주문 · 카테고리 · 설정</div>
      <button class="card-btn">관리자 입장</button>
    </a>
  </div>
</div>
</body>
</html>
