<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MICOZ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300;1,400&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">

<style>
  :root {
    --plum-900: #18102a;
    --plum-800: #221638;
    --plum-700: #2a1a3e;
    --plum-600: #3a2552;
    --plum-500: #4d3470;
    --plum-400: #6b4d8f;
    --plum-300: #9a7fb8;
    --plum-200: #c4b0d8;
    --plum-100: #e8d8f0;
    --plum-50:  #f5edf7;
    --cream:    #f5f1ea;
    --cream-2:  #ede7dc;
    --paper:    #faf7f2;
    --ink:      #1a1424;
    --muted:    #6b5d72;
    --line:     rgba(42, 26, 62, 0.12);
    --line-strong: rgba(42, 26, 62, 0.22);
    --gold:     #b89968;

    --serif: "Noto Serif KR", "Spectral", "Times New Roman", serif;
    --serif-en: "Spectral", "Noto Serif KR", serif;
    --sans:  "Pretendard", -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--cream);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; }

  /* ────────────────────────────────────────────────────────
     TWEAKS — Mood / Voice / Rhythm
     Each control re-skins the whole design, not pixel-pushing
     ──────────────────────────────────────────────────────── */

  /* MOOD — color palette of the entire experience */
  .mood-plum {
    /* default — defined in :root above */
  }
  .mood-aubergine {
    --plum-900: #1f0d2e;
    --plum-800: #2c1340;
    --plum-700: #3d1c54;
    --plum-600: #5a2978;
    --plum-500: #75409a;
    --plum-400: #9966bf;
    --plum-300: #b491d8;
    --plum-200: #d8c2e8;
    --plum-100: #ecdbf2;
    --plum-50:  #f8eef9;
    --cream:    #f7f1e8;
    --paper:    #fcf8f0;
  }
  .mood-midnight {
    --plum-900: #050816;
    --plum-800: #0a1028;
    --plum-700: #131c40;
    --plum-600: #1f2b5e;
    --plum-500: #303f7a;
    --plum-400: #4a5a9a;
    --plum-300: #7a89bf;
    --plum-200: #b1bce0;
    --plum-100: #d6dcec;
    --plum-50:  #ecf0f8;
    --cream:    #eef0f5;
    --paper:    #f7f8fb;
  }
  .mood-rosewine {
    --plum-900: #2d0a1f;
    --plum-800: #401130;
    --plum-700: #5c1a45;
    --plum-600: #7d2a5d;
    --plum-500: #9c3f78;
    --plum-400: #b86494;
    --plum-300: #d490b6;
    --plum-200: #e8b8cf;
    --plum-100: #f1d4e2;
    --plum-50:  #f8e8ee;
    --cream:    #f8f0ec;
    --paper:    #fcf6f3;
  }

  /* VOICE — typographic personality */
  .voice-editorial {
    /* default */
  }
  .voice-whisper h1, .voice-whisper h2 {
    font-weight: 200 !important;
    letter-spacing: -0.03em !important;
  }
  .voice-whisper .voice-num {
    font-weight: 200 !important;
  }
  .voice-whisper [class*="serif-en"], .voice-whisper {
    --letter-display: 0.08em;
  }
  .voice-whisper .uppercase, .voice-whisper [style*="letter-spacing"] {
    /* leave inline letter-spacings alone */
  }

  .voice-bold h1, .voice-bold h2, .voice-bold h3 {
    font-weight: 600 !important;
    letter-spacing: -0.025em !important;
  }
  .voice-bold {
    --serif-weight-display: 600;
  }

  /* Voice → font family swaps via @font-face-style switching */
  .voice-whisper {
    --serif: "Spectral", "Noto Serif KR", "Times New Roman", serif;
    --serif-en: "Spectral", "Noto Serif KR", serif;
  }
  .voice-bold {
    --serif: "Noto Serif KR", "Spectral", serif;
    --serif-en: "Spectral", "Noto Serif KR", serif;
  }

  /* RHYTHM — spatial density */
  .rhythm-generous {
    /* default */
  }
  .rhythm-refined {
    /* tighter — compress sections, smaller hero type */
  }
  .rhythm-refined h1 { font-size: 0.78em !important; }
  .rhythm-refined h2 { font-size: 0.82em !important; }
  .rhythm-refined section { padding-top: 0.7em !important; padding-bottom: 0.7em !important; }
  /* (selectively — the 'em' relative trick won't work on px values; use direct overrides) */
  .rhythm-refined .hero-title { font-size: 72px !important; }
  .rhythm-refined .section-pad { padding-top: 96px !important; padding-bottom: 80px !important; }

  .rhythm-magazine h1 { letter-spacing: -0.03em !important; }
  .rhythm-magazine .hero-title { font-size: 132px !important; line-height: 0.92 !important; }
  .rhythm-magazine .section-pad { padding-top: 220px !important; padding-bottom: 200px !important; }
  .rhythm-magazine .hero-eyebrow { font-size: 13px !important; letter-spacing: 0.7em !important; }
  .rhythm-magazine .big-num { font-size: 1.4em !important; }

  /* Universal: tame transitions so re-skins feel intentional */
  .mood-skin * {
    transition: background-color .4s ease, color .4s ease, border-color .4s ease;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shop/design-canvas.jsx"></script>
<script type="text/babel" src="shop/ios-frame.jsx"></script>
<script type="text/babel" src="shop/data.jsx"></script>
<script type="text/babel" src="shop/primitives.jsx"></script>
<script type="text/babel" src="shop/screens-desktop.jsx"></script>
<script type="text/babel" src="shop/screens-desktop2.jsx"></script>
<script type="text/babel" src="shop/screens-mobile.jsx"></script>
<script type="text/babel" src="shop/screens-auth-cart.jsx"></script>
<script type="text/babel" src="shop/tweaks-panel.jsx"></script>
<script type="text/babel" src="shop/app.jsx"></script>
<script type="text/babel" src="shop/tweaks-app.jsx"></script>

</body>
</html>
