<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>MICOZ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">

<style>
  :root {
    --plum-900: #2d2347;
    --plum-800: #352a50;
    --plum-700: #3a2e58;
    --plum-600: #3a2552;
    --plum-500: #4d3470;
    --plum-400: #6b4d8f;
    --plum-300: #9a7fb8;
    --plum-200: #c4b0d8;
    --plum-100: #e8d8f0;
    --plum-50:  #f5edf7;
    --cream:    #fafafa;
    --cream-2:  #efeaf2;
    --paper:    #ffffff;
    --ink:      #1a1424;
    --muted:    #6b5d72;
    --line:     rgba(42, 26, 62, 0.12);
    --line-strong: rgba(42, 26, 62, 0.22);
    --gold:     #b89968;

    --serif: "Noto Serif KR", "Spectral", "Times New Roman", serif;
    --serif-en: "Spectral", "Noto Serif KR", serif;
    --sans:  "Pretendard", -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--cream);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; }

  /* ─── Mobile responsive overrides ─────────────────────── */
  /* For screens without dedicated mobile components (cart, checkout, confirm, story, login, signup, mypage),
     compress paddings and flatten grids so they remain usable on small viewports. */
  @media (max-width: 768px) {
    /* section padding */
    main > section[style*="padding: '60px 56px"],
    main > section[style*="padding: '80px 56px"],
    main > section[style*="padding: '120px 56px"],
    main > section[style*="padding: '40px 56px 120px'"],
    main > section[style*="padding: '60px 56px 40px'"],
    main > section[style*="padding: '60px 56px 0'"],
    main > section[style*="padding: '40px 56px 32px'"],
    main > section[style*="padding: '56px 56px 32px'"] {
      padding: 32px 20px !important;
    }
    /* Generic: collapse 2-col grids to 1-col */
    main [style*="gridTemplateColumns: '1fr 1fr'"],
    main [style*="gridTemplateColumns: '1.5fr 1fr'"],
    main [style*="gridTemplateColumns: '1.4fr 1fr'"],
    main [style*="gridTemplateColumns: '1.2fr 1fr'"],
    main [style*="gridTemplateColumns: '240px 1fr'"],
    main [style*="gridTemplateColumns: '220px 1fr'"],
    main [style*="gridTemplateColumns: '1fr 380px'"] {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
    }
    /* 3-col and 4-col collapse to 2-col */
    main [style*="gridTemplateColumns: 'repeat(3, 1fr)'"],
    main [style*="gridTemplateColumns: 'repeat(4, 1fr)'"],
    main [style*="gridTemplateColumns: '1fr 1fr 1fr'"] {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 14px !important;
    }
    /* Auth shell padding */
    main[style*="64px 24px 160px"] {
      padding: 32px 18px 80px !important;
    }
    /* Footer */
    footer {
      padding: 48px 20px 36px !important;
    }
    footer [style*="textAlign: 'right'"] {
      text-align: left !important;
    }
    /* Display H1 sizes — auto-shrink */
    main h1[style*="fontSize: 64"],
    main h1[style*="fontSize: 76"],
    main h1[style*="fontSize: 56"],
    main h2[style*="fontSize: 56"],
    main h2[style*="fontSize: 52"],
    main h2[style*="fontSize: 48"],
    main h2[style*="fontSize: 44"],
    main h2[style*="fontSize: 40"] {
      font-size: 28px !important;
      line-height: 1.25 !important;
    }
    main h2[style*="fontSize: 36"],
    main h2[style*="fontSize: 32"] {
      font-size: 22px !important;
    }
    /* Sticky aside summary — release on mobile */
    main aside[style*="position: 'sticky'"] {
      position: static !important;
    }
    /* Hide desktop header & footer when on mobile screens (we render MobileTabBar instead) */
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="shop/image-slot.js"></script>
<script type="text/babel" src="shop/ios-frame.jsx"></script>
<script type="text/babel" src="shop/data.jsx"></script>
<script type="text/babel" src="shop/primitives.jsx"></script>
<script type="text/babel" src="shop/screens-desktop.jsx"></script>
<script type="text/babel" src="shop/screens-desktop2.jsx"></script>
<script type="text/babel" src="shop/screens-mobile.jsx"></script>
<script type="text/babel" src="shop/screens-auth-cart.jsx"></script>
<script type="text/babel" src="shop/app-live.jsx"></script>

</body>
</html>
