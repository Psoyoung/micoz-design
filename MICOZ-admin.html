<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MICOZ — Admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Spectral:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">

<style>
  :root {
    /* Admin neutrals — paper warm, ink cool plum */
    --ad-paper:      #f6f3ec;
    --ad-paper-2:    #fbf9f3;
    --ad-ink:        #1a1424;
    --ad-muted:      #6b5d72;
    --ad-line:       rgba(42, 26, 62, 0.10);
    --ad-line-soft:  rgba(42, 26, 62, 0.05);
    --ad-line-strong:rgba(42, 26, 62, 0.18);

    /* Brand carry-over (matches MICOZ shopfront) */
    --plum-900: #18102a;
    --plum-800: #221638;
    --plum-700: #2a1a3e;
    --plum-600: #3a2552;
    --plum-500: #4d3470;
    --plum-400: #6b4d8f;
    --plum-300: #9a7fb8;
    --plum-200: #c4b0d8;
    --plum-100: #e8d8f0;

    --serif:    "Noto Serif KR", "Spectral", "Times New Roman", serif;
    --serif-en: "Spectral", "Noto Serif KR", serif;
    --sans:     "Pretendard", -apple-system, "Apple SD Gothic Neo", system-ui, sans-serif;
    --mono:     "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ad-ink);
    background: var(--ad-paper);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }

  /* Scrollbar — restrained */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb {
    background: rgba(42, 26, 62, 0.18);
    border: 2px solid var(--ad-paper);
  }
  ::-webkit-scrollbar-track { background: transparent; }

  table { border-spacing: 0; }
  input[type="checkbox"] { accent-color: #3a2552; }

  @keyframes modalIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* Korean text wrap protection — UI chrome should not break mid-word */
  button, .ad-nowrap { white-space: nowrap; }
  /* Status / grade chips and small meta labels: never break */
  span[data-chip], .ad-chip { white-space: nowrap; }

  /* Top brand bar — micro */
  .ad-brandbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 0;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="admin/admin-data.jsx"></script>
<script type="text/babel" src="admin/admin-primitives.jsx"></script>
<script type="text/babel" src="admin/admin-views-1.jsx"></script>
<script type="text/babel" src="admin/admin-views-2.jsx"></script>
<script type="text/babel" src="admin/admin-app.jsx"></script>

</body>
</html>
